<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h3 class="text-center mb-3">Issue Book</h3>

                <form th:action="@{/books/issue/save}" method="post">
                    <input type="hidden" name="bookId" th:value="${bookId}"/>

                    <div class="mb-3">
                        <label class="form-label">Person Name</label>
                        <input type="text" name="personName" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" name="mobile" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Issue Date</label>
                        <input type="date" name="issueDate" class="form-control" required/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Confirm Issue</button>
                </form>

                <a th:href="@{/books}" class="btn btn-secondary w-100 mt-3">Back to Inventory</a>

            </div>
        </div>
    </div>
</div>

</body>
</html>
