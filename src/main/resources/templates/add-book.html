<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h3 class="text-center mb-3">Add New Book</h3>

                <form th:action="@{/books/save}" th:object="${book}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" th:field="*{title}" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Author</label>
                        <input type="text" th:field="*{author}" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" th:field="*{category}" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" th:field="*{quantity}" min="1" class="form-control" required/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save Book</button>
                </form>

                <a th:href="@{/books}" class="btn btn-secondary w-100 mt-3">Back to Inventory</a>

            </div>
        </div>
    </div>
</div>

</body>
</html>
