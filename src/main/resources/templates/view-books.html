<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">Book Inventory</h2>

    <div class="d-flex justify-content-between mb-3">
        <a th:href="@{/books/add}" class="btn btn-success">Add Book</a>
        <a th:href="@{/books/issued}" class="btn btn-info text-white">View Issued Books</a>
    </div>

    <table class="table table-bordered table-striped text-center">
        <thead class="table-secondary">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.quantity}"></td>
            <td>
                <a th:href="@{'/books/issue/' + ${book.id}}" class="btn btn-warning btn-sm text-white">Issue</a>
                <a th:href="@{'/books/delete/' + ${book.id}}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="text-center mt-3">
        <a th:href="@{/logout}" class="btn btn-dark">Logout</a>
    </div>
</div>

</body>
</html>
